services:
  ingest-api:
    build: ./services/ingest-api
    ports:
      - "${INGEST_API_PORT:-8001}:8001"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  processor:
    build: ./services/processor
    ports:
      - "${PROCESSOR_PORT:-8002}:8002"
    environment:
      - PORT=8002
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  dashboard-bff:
    build: ./services/dashboard-bff
    ports:
      - "${DASHBOARD_BFF_PORT:-8003}:8003"
    environment:
      - PORT=8003
      - INGEST_API_URL=http://ingest-api:8001
      - PROCESSOR_URL=http://processor:8002
    depends_on:
      ingest-api:
        condition: service_healthy
      processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
